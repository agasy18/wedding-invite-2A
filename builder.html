<!DOCTYPE html>
<html lang="hy">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Հրավիրատոմսերի գեներատոր · Aghasi &amp; Anna</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Italiana&family=Noto+Serif+Armenian:wght@300;400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />

  <script src="nameCodec.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" integrity="sha384-DGyLxAyjq0f9SPpVevD6IgztCFlnMF6oW/XQGmfe+IsZ8TqEiDrcHkMLKI6fiB/Z" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" integrity="sha384-gTGxhz21lVGYNMcdJOyq01Edg0jhn/c22nsx0kyqP0TxaV5WVdsSH1fSDUf5YJj1" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    body {
      min-height: 100vh;
      padding: clamp(20px, 4vw, 60px);
      display: block;
    }

    .builder-wrap {
      width: min(780px, 100%);
      margin: 0 auto;
    }

    .builder-header {
      text-align: center;
      margin-bottom: 48px;
      padding-top: 20px;
    }
    .builder-eyebrow {
      font-family: var(--f-arm);
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--c-gold);
      margin-bottom: 14px;
    }
    .builder-title {
      font-family: var(--f-arm-disp);
      font-size: clamp(32px, 5vw, 48px);
      color: var(--c-wine);
      margin: 0 0 8px;
      font-weight: 400;
    }
    .builder-sub {
      font-family: var(--f-serif);
      font-style: italic;
      font-size: clamp(14px, 2vw, 18px);
      color: var(--c-wine-2);
      opacity: 0.75;
      margin: 0;
    }
    .builder-divider { margin: 18px auto; display: flex; justify-content: center; }

    .builder-card {
      position: relative;
      background: var(--c-ivory);
      border: 1px solid rgba(184,137,74,0.3);
      padding: clamp(28px, 4vw, 44px);
      box-shadow: 0 10px 40px rgba(107,31,42,0.06);
      overflow: hidden;
    }
    .builder-card::before {
      content: '';
      position: absolute; inset: 8px;
      border: 0.5px solid rgba(184,137,74,0.25);
      pointer-events: none;
    }

    .builder-flower {
      position: absolute;
      pointer-events: none;
      z-index: 0;
      opacity: 0.8;
    }
    .bf-tl { top: -25px; left: -25px; transform: rotate(-20deg); }
    .bf-br { bottom: -25px; right: -25px; transform: rotate(20deg); }

    .builder-form {
      position: relative;
      z-index: 1;
    }

    .field-label {
      display: block;
      font-family: var(--f-arm);
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--c-wine-2);
      opacity: 0.8;
      margin-bottom: 10px;
    }

    .name-input {
      width: 100%;
      padding: 18px 22px;
      font-family: var(--f-arm-disp);
      font-size: clamp(22px, 3vw, 28px);
      font-weight: 400;
      background: var(--c-paper);
      border: 1px solid rgba(107,31,42,0.15);
      color: var(--c-wine);
      border-radius: 2px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .name-input:focus {
      border-color: var(--c-gold);
      box-shadow: 0 0 0 3px rgba(184,137,74,0.15);
    }

    .url-preview {
      margin-top: 24px;
      padding: 18px 22px;
      background: var(--c-paper);
      border: 1px dashed rgba(184,137,74,0.4);
      border-radius: 2px;
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 62px;
      flex-wrap: wrap;
    }
    .url-preview code {
      flex: 1;
      font-family: var(--f-mono);
      font-size: 13px;
      color: var(--c-wine);
      word-break: break-all;
      overflow-wrap: anywhere;
      min-width: 200px;
    }
    .url-preview code .hl { color: var(--c-gold); }

    .copy-btn {
      padding: 10px 16px;
      font-family: var(--f-arm);
      font-size: 12px;
      letter-spacing: 0.15em;
      background: var(--c-wine);
      color: var(--c-ivory);
      border: 1px solid var(--c-wine);
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .copy-btn:hover { background: var(--c-wine-2); }
    .copy-btn.copied { background: var(--c-sage); border-color: var(--c-sage); }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 28px;
      flex-wrap: wrap;
    }
    .actions button {
      flex: 1;
      min-width: 140px;
      padding: 16px 20px;
      font-family: var(--f-arm);
      font-size: 13px;
      letter-spacing: 0.15em;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.2s;
    }
    .btn-open {
      background: transparent;
      color: var(--c-wine);
      border: 1px solid var(--c-wine);
    }
    .btn-open:hover { background: var(--c-wine); color: var(--c-ivory); }
    .btn-share {
      background: var(--c-gold);
      color: var(--c-ivory);
      border: 1px solid var(--c-gold);
    }
    .btn-share:hover { filter: brightness(0.95); }

    .saved-section {
      margin-top: 40px;
    }
    .saved-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .saved-header h3 {
      font-family: var(--f-arm-disp);
      font-size: 22px;
      color: var(--c-wine);
      margin: 0;
      font-weight: 400;
    }
    .saved-count {
      font-family: var(--f-mono);
      font-size: 11px;
      color: var(--c-wine-2);
      opacity: 0.6;
      letter-spacing: 0.1em;
    }

    .saved-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .saved-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      background: var(--c-ivory);
      border: 1px solid rgba(184,137,74,0.2);
      border-radius: 2px;
      transition: border-color 0.2s;
    }
    .saved-item:hover { border-color: var(--c-gold); }
    .saved-name {
      flex: 1;
      font-family: var(--f-arm-disp);
      font-size: 20px;
      color: var(--c-wine);
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .saved-actions { display: flex; gap: 6px; }
    .saved-actions button {
      padding: 6px 10px;
      font-family: var(--f-arm);
      font-size: 10px;
      letter-spacing: 0.15em;
      background: transparent;
      color: var(--c-wine-2);
      border: 1px solid rgba(107,31,42,0.2);
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .saved-actions button:hover { border-color: var(--c-wine); color: var(--c-wine); }
    .saved-actions .del:hover { border-color: var(--c-wine-2); color: var(--c-wine-2); background: rgba(107,31,42,0.05); }

    .back-link {
      display: inline-block;
      margin-top: 40px;
      font-family: var(--f-arm);
      font-size: 12px;
      letter-spacing: 0.2em;
      color: var(--c-wine-2);
      text-decoration: none;
      opacity: 0.6;
      transition: opacity 0.2s;
    }
    .back-link:hover { opacity: 1; color: var(--c-wine); }

    .empty-state {
      padding: 32px 16px;
      text-align: center;
      font-family: var(--f-serif);
      font-style: italic;
      font-size: 14px;
      color: var(--c-wine-2);
      opacity: 0.5;
    }

    .toast {
      position: fixed;
      bottom: 30px; left: 50%;
      transform: translateX(-50%);
      padding: 12px 24px;
      background: var(--c-wine);
      color: var(--c-ivory);
      font-family: var(--f-arm);
      font-size: 13px;
      letter-spacing: 0.1em;
      border-radius: 2px;
      box-shadow: 0 10px 30px rgba(107,31,42,0.3);
      animation: toastIn 0.3s ease-out;
      z-index: 200;
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translate(-50%, 20px); }
      to   { opacity: 1; transform: translate(-50%, 0); }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="florals.jsx"></script>
  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const STORAGE_KEY = 'aa_guests_v1';

    const App = () => {
      const [name, setName] = useState('');
      const [saved, setSaved] = useState(() => {
        try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
        catch { return []; }
      });
      const [copied, setCopied] = useState(false);
      const [toast, setToast] = useState('');

      useEffect(() => {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
      }, [saved]);

      const baseUrl = useMemo(() => {
        const loc = window.location;
        const invPath = loc.pathname.replace(/builder\.html$/, 'index.html');
        return loc.origin + invPath;
      }, []);

      const fullUrl = (n) => {
        const t = n.trim();
        if (!t) return baseUrl;
        return `${baseUrl}?n=${WeddingCodec.encodeName(t)}`;
      };

      const showToast = (msg) => {
        setToast(msg);
        setTimeout(() => setToast(''), 2200);
      };

      const copy = async (text, markCopied) => {
        try {
          await navigator.clipboard.writeText(text);
          if (markCopied) {
            setCopied(true);
            setTimeout(() => setCopied(false), 1800);
          }
          showToast('Հղումը պատճենված է');
        } catch {
          showToast('Չհաջողվեց պատճենել');
        }
      };

      const add = () => {
        const n = name.trim();
        if (!n) return;
        if (saved.includes(n)) { showToast('Արդեն ավելացված է'); setName(''); return; }
        setSaved([n, ...saved]);
        setName('');
        showToast(`«${n}» ավելացված է`);
      };

      const remove = (n) => {
        setSaved(saved.filter(s => s !== n));
      };

      const share = (n) => {
        const url = fullUrl(n);
        const text = `Սիրելի ${n}, սիրով հրավիրում ենք Ձեզ մեր հարսանյաց արարողությանը: ${url}`;
        if (navigator.share) {
          navigator.share({ title: 'Աղասի & Աննա', text, url }).catch(() => {});
        } else {
          copy(text, false);
        }
      };

      return (
        <div className="builder-wrap">
          <FloralDefs />

          <header className="builder-header">
            <div className="builder-eyebrow">Աղասի &amp; Աննա · 06.09.2026</div>
            <h1 className="builder-title">Հրավիրատոմսերի գեներատոր</h1>
            <div className="builder-divider"><ArmDivider width={140} /></div>
            <p className="builder-sub">Generate a personal link for each guest</p>
          </header>

          <div className="builder-card">
            <div className="builder-flower bf-tl"><Rose size={100} color="var(--c-blush)" /></div>
            <div className="builder-flower bf-br"><Cosmos size={80} color="var(--c-coral)" /></div>

            <div className="builder-form">
              <label className="field-label">Հյուրի անուն · Guest name</label>
              <input
                className="name-input"
                value={name}
                onChange={e => setName(e.target.value)}
                onKeyDown={e => { if (e.key === 'Enter') add(); }}
                placeholder="Արմեն Հակոբյան"
                list="arm-names"
                autoFocus
              />
              <datalist id="arm-names">
                {WeddingCodec.ALL_NAMES.map(n => <option key={n} value={n} />)}
              </datalist>

              {name.trim() && (
                <div style={{
                  marginTop: 10,
                  fontFamily: 'var(--f-arm)',
                  fontSize: 11,
                  letterSpacing: '0.15em',
                  textTransform: 'uppercase',
                  color: WeddingCodec.isDictionaryHit(name) ? 'var(--c-sage)' : 'var(--c-gold)',
                }}>
                  {WeddingCodec.isDictionaryHit(name)
                    ? '✓ Բառարանից — կարճ հղում'
                    : '∿ Base64 կոդավորում — ավելի երկար հղում'}
                </div>
              )}

              <label className="field-label" style={{ marginTop: 24 }}>Անհատական հղում</label>
              <div className="url-preview">
                <code>
                  {baseUrl}?n=<span className="hl">{name.trim() ? WeddingCodec.encodeName(name) : '…'}</span>
                </code>
                <button className={`copy-btn ${copied ? 'copied' : ''}`}
                  onClick={() => copy(fullUrl(name), true)}
                  disabled={!name.trim()}
                  style={{ opacity: name.trim() ? 1 : 0.5, cursor: name.trim() ? 'pointer' : 'not-allowed' }}>
                  {copied ? '✓ Պատճենված' : 'Պատճենել'}
                </button>
              </div>

              <div className="actions">
                <button className="btn-open"
                  onClick={() => window.open(fullUrl(name), '_blank')}
                  disabled={!name.trim()}
                  style={{ opacity: name.trim() ? 1 : 0.5, cursor: name.trim() ? 'pointer' : 'not-allowed' }}>
                  Բացել նախադիտումը
                </button>
                <button className="btn-share" onClick={add} disabled={!name.trim()}
                  style={{ opacity: name.trim() ? 1 : 0.5, cursor: name.trim() ? 'pointer' : 'not-allowed' }}>
                  + Ավելացնել ցուցակին
                </button>
              </div>
            </div>
          </div>

          <section className="saved-section">
            <div className="saved-header">
              <h3>Ցուցակ · Saved guests</h3>
              <span className="saved-count">{saved.length} հյուր</span>
            </div>

            {saved.length === 0 ? (
              <div className="empty-state">Դեռ ոչ ոք չկա — ավելացրեք հյուր ցուցակին:</div>
            ) : (
              <ul className="saved-list">
                {saved.map(n => (
                  <li key={n} className="saved-item">
                    <div className="saved-name">{n}</div>
                    <div className="saved-actions">
                      <button onClick={() => copy(fullUrl(n), false)}>Պատճ.</button>
                      <button onClick={() => share(n)}>Ուղարկել</button>
                      <button onClick={() => window.open(fullUrl(n), '_blank')}>Բացել</button>
                      <button className="del" onClick={() => remove(n)}>✕</button>
                    </div>
                  </li>
                ))}
              </ul>
            )}
          </section>

          <a className="back-link" href="index.html">← Վերադառնալ հրավիրատոմս</a>

          {toast && <div className="toast">{toast}</div>}
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
