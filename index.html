<!DOCTYPE html>
<html lang="hy">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Աղասի &amp; Աննա · 06.09.2026</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Italiana&family=Noto+Serif+Armenian:wght@300;400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css" />

  <script src="nameCodec.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" integrity="sha384-DGyLxAyjq0f9SPpVevD6IgztCFlnMF6oW/XQGmfe+IsZ8TqEiDrcHkMLKI6fiB/Z" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" integrity="sha384-gTGxhz21lVGYNMcdJOyq01Edg0jhn/c22nsx0kyqP0TxaV5WVdsSH1fSDUf5YJj1" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="florals.jsx"></script>
  <script type="text/babel" src="sections.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // ------- Nav dots -------
    const NavDots = ({ sections, active, onGo }) => (
      <nav className="nav-dots" aria-label="sections">
        {sections.map((s, i) => (
          <button key={s.id}
            className={`nav-dot ${i === active ? 'active' : ''}`}
            onClick={() => onGo(i)}
            aria-label={s.label} />
        ))}
      </nav>
    );

    // ------- App -------
    const App = () => {
      const [active, setActive] = useState(0);

      // Get guest name from URL (?n=<encoded> | ?name=<raw>)
      const guestName = useMemo(() => WeddingCodec.readGuestNameFromUrl(), []);

      // Bake in whisper ornament density
      useEffect(() => {
        document.documentElement.dataset.density = 'whisper';
      }, []);

      // Section nav
      const sectionDefs = [
        { id: 'hero', label: 'Հրավեր' },
        { id: 'video', label: 'Տեսահոլովակ' },
        { id: 'countdown', label: 'Մնաց' },
        { id: 'schedule', label: 'Օրակարգ' },
        { id: 'gallery', label: 'Պահեր' },
        { id: 'rsvp', label: 'Հաստատում' },
      ];

      useEffect(() => {
        const els = sectionDefs.map(s => document.getElementById(s.id)).filter(Boolean);
        if (els.length === 0) return;
        const obs = new IntersectionObserver(entries => {
          entries.forEach(e => {
            if (e.isIntersecting) {
              const idx = els.indexOf(e.target);
              if (idx >= 0) setActive(idx);
            }
          });
        }, { threshold: 0.5 });
        els.forEach(el => obs.observe(el));
        return () => obs.disconnect();
      }, []);

      const goTo = (i) => {
        const el = document.getElementById(sectionDefs[i].id);
        if (el) window.scrollTo({ top: el.offsetTop, behavior: 'smooth' });
      };

      return (
        <div className="app">
          <FloralDefs />

          <div id="hero"><HeroSection guestName={guestName} /></div>
          <div id="video"><VideoSection /></div>
          <div id="countdown"><CountdownSection /></div>
          <div id="schedule"><ScheduleSection /></div>
          <div id="gallery"><GallerySection /></div>
          <div id="rsvp"><RsvpSection guestName={guestName} /></div>

          <NavDots sections={sectionDefs} active={active} onGo={goTo} />
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

</body>
</html>
